script:
  btop: |
    latest \
      "-x86_64-linux-musl.tbz" \
      "https://api.github.com/repos/aristocratos/btop/releases/latest" \
      "btop"
    echo "btop installed successfully."
  sweep-repos-cron: |
    # Weekly sweep of stale Rust build artifacts across ~/repos. Runs
    # ~/bin/sweep-repos (linked from HOME/bin/sweep-repos), which enumerates
    # each repo's Cargo.toml at reposlug depth and sweeps per repo -- avoiding
    # the `cargo sweep -r ~/repos` walk that stalled on large targets (e.g.
    # second-brain) and silently made the old cron a no-op. Deletes target/
    # artifacts older than 14 days. Runs Sundays 03:00.
    LINE='0 3 * * 0 /home/saidler/bin/sweep-repos --time 14 >> /home/saidler/.cache/sweep-repos.log 2>&1'
    mkdir -p /home/saidler/.cache
    (crontab -l 2>/dev/null | grep -vE "cargo-sweep|sweep-repos"; echo "$LINE") | crontab -
    echo "sweep-repos weekly cron installed"
  cheat: |
    curl https://cht.sh/:cht.sh > ~/bin/cheat
    chmod +x ~/bin/cheat
  passwordless-sudo: |
    # Grant the current user passwordless sudo via a /etc/sudoers.d/ drop-in
    # instead of editing /etc/sudoers directly. The content is syntax-checked
    # with `visudo -cf -` before install; a malformed sudoers file can lock you
    # out of sudo entirely, so install is skipped if validation fails. The
    # filename is the bare username (no '.' or '~') so sudo's #includedir does
    # not skip it; the file is installed root:root mode 0440 as sudo requires.
    # First run prompts for your password (that is the point); subsequent sudo
    # is passwordless.
    user="$(whoami)"
    file="/etc/sudoers.d/$user"
    content="$(printf '%s\n' "# Managed by scottidler/dotfiles via manifest - do not edit directly." "$user ALL=(ALL) NOPASSWD: ALL")"
    if printf '%s\n' "$content" | visudo -cf -; then
      printf '%s\n' "$content" | sudo tee "$file" >/dev/null
      sudo chown root:root "$file"
      sudo chmod 0440 "$file"
      echo "installed $file (passwordless sudo)"
    else
      echo "ERROR: sudoers syntax check failed; $file not installed" >&2
    fi
  disable-ipv6: |
    sudo tee /etc/sysctl.d/99-disable-ipv6.conf <<'EOF'
    # Disable IPv6 system-wide.
    # Managed by ~/... dotfiles via manifest - do not edit directly.
    # Without this, routers advertising IPv6 via RA can inject routes that
    # NetworkManager tries (and fails) to use for connectivity checks, causing
    # the WiFi "?" icon even when IPv4 is fully functional.
    net.ipv6.conf.all.disable_ipv6 = 1
    net.ipv6.conf.all.disable_policy = 1
    net.ipv6.conf.default.disable_ipv6 = 1
    net.ipv6.conf.default.disable_policy = 1
    net.ipv6.conf.wlp2s0.disable_ipv6 = 1
    EOF
    sudo sysctl --load /etc/sysctl.d/99-disable-ipv6.conf
  local-tatari-tools-dns: |
    sudo mkdir -p /etc/systemd/resolved.conf.d
    sudo tee /etc/systemd/resolved.conf.d/local-tatari-tools.conf <<'EOF'
    # Route local.tatari.tools to public resolvers that return its real A record.
    # Managed by dotfiles via manifest - do not edit directly.
    # local.tatari.tools is the persona-cli OAuth PKCE redirect host: a public
    # DNS name pointing at loopback (127.0.0.1). A link resolver (e.g. a home
    # router) may strip a public name that resolves to loopback, returning
    # NOERROR/0-answers, so the OAuth browser callback fails with "Server Not
    # Found". Routing only this name to public DNS fixes it without /etc/hosts;
    # .lan and all other DNS stay on the link resolver. See persona-cli
    # docs/auth-security-review.md.
    [Resolve]
    DNS=1.1.1.1 8.8.8.8
    Domains=~local.tatari.tools
    EOF
    sudo systemctl restart systemd-resolved
    sudo resolvectl flush-caches
    echo "local.tatari.tools DNS routing installed"
  docker: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
    sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
    sudo apt-get update
    sudo apt-get install -y docker-ce
  fluxctl: |
    latest \
      "fluxctl_linux_amd64" \
      "https://api.github.com/repos/fluxcd/flux/releases/latest" \
      "fluxctl"
  fzf: |
    latest \
      "fzf-.*-linux_amd64.tar.gz" \
      "https://api.github.com/repos/junegunn/fzf/releases/latest" \
      "fzf"
  firefox-opt: |
    # Mozilla's official Firefox under /opt, replacing the Ubuntu snap. snap
    # confinement silently breaks extension capabilities: the obsidian-borg
    # capture web-ext's POST to the local borg daemon never lands under snap,
    # yet works in this /opt build (proven 2026-06-07 - identical extension,
    # identical daemon). Bookmarks/logins/most add-ons return via Firefox Sync;
    # only the obsidian-borg web-ext must be re-added by hand afterward.
    TMP=$(mktemp -d)
    curl -fsSL -o "$TMP/firefox.tar.xz" "https://download.mozilla.org/?product=firefox-latest&os=linux64&lang=en-US"
    sudo rm -rf /opt/firefox
    sudo tar xf "$TMP/firefox.tar.xz" -C /opt
    rm -rf "$TMP"
    sudo ln -sf /opt/firefox/firefox /usr/local/bin/firefox
    sudo tee /usr/share/applications/firefox.desktop >/dev/null <<'DESKTOP'
    [Desktop Entry]
    Name=Firefox
    Comment=Web Browser
    Exec=/opt/firefox/firefox %u
    Icon=/opt/firefox/browser/chrome/icons/default/default128.png
    Terminal=false
    Type=Application
    Categories=Network;WebBrowser;
    MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;
    StartupNotify=true
    StartupWMClass=firefox
    DESKTOP
    sudo snap remove firefox 2>/dev/null || true
    sudo tee /etc/apt/preferences.d/no-firefox-snap >/dev/null <<'PIN'
    # Block Ubuntu's transitional firefox deb (it reinstalls the snap).
    # Firefox is managed under /opt by dotfiles - do not let apt restore the snap.
    Package: firefox
    Pin: release o=Ubuntu
    Pin-Priority: -1
    PIN
    echo "firefox: /opt install complete; snap removed + pinned out. Re-add the obsidian-borg web-ext after Firefox Sync login."
  exercism: |
    LATEST="https://api.github.com/repos/exercism/cli/releases/latest"
    URL=$(curl -sL "$LATEST" | jq -r ".assets[] | select(.name | test(\"$OS-$ARCH\")) | .browser_download_url")
    # Download + extract in a temp dir, pulling ONLY the binary into ~/bin.
    # The release tarball also contains LICENSE/README.md/shell/; extracting it
    # in CWD (repo root) used to clobber this repo's own files.
    TMP=$(mktemp -d)
    wget -q -P "$TMP" "$URL"
    tar xf "$TMP/$(basename "$URL")" -C ~/bin/ exercism
  git-tools: |
    latest \
      "git-tools-v.*-linux.tar.gz" \
      "https://api.github.com/repos/scottidler/git-tools/releases/latest" \
      "git-tools-v.*-linux.tar.gz"
    tar -xzf git-tools-v.*-linux.tar.gz -C ~/bin/
    mv ~/bin/shell-functions.sh ~/.shell-functions.d/git-tools.sh
    rm git-tools-v.*-linux.tar.gz
  github-cli: |
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
      && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
      && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
      | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
      && sudo apt update \
      && sudo apt install gh -y
  gnome-no-idle-dim: |
    # Stop GNOME dimming the screen on idle.
    # The `power-saver` power profile forces idle screen-dimming down to the
    # `idle-brightness` percentage EVEN WHEN the "Dim Screen" toggle (idle-dim)
    # is off - so the GUI toggle alone doesn't fix it. Pinning idle-brightness
    # to 100 makes that forced dim a no-op no matter which profile is active,
    # so it's robust across machines and battery/AC.
    gsettings set org.gnome.settings-daemon.plugins.power idle-dim false
    gsettings set org.gnome.settings-daemon.plugins.power idle-brightness 100
    echo "gnome idle screen-dimming disabled"
  helm: |
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh; rm ./get_helm.sh
  keybase: |
    # src: https://keybase.io/docs/the_app/install_linux
    curl --remote-name https://prerelease.keybase.io/keybase_amd64.deb
    sudo apt install -y ./keybase_amd64.deb
    rm -rf keybase_amd64.deb
    run_keybase
  kubectl: |
    sudo apt-get update && sudo apt-get install -y apt-transport-https
    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add -
    echo "deb https://apt.kubernetes.io/ kubernetes-xenial main" | sudo tee -a /etc/apt/sources.list.d/kubernetes.list
    sudo apt-get update
    sudo apt-get install -y kubectl
  kubetpl: |
    latest \
      "linux-amd64" \
      "https://api.github.com/repos/shyiko/kubetpl/releases/latest" \
      "kubetpl"
  kind: |
    latest \
      "kind-linux-amd64" \
      "https://api.github.com/repos/kubernetes-sigs/kind/releases/latest" \
      "kind"
  k9s: |
    latest \
      "k9s_Linux_amd64.tar.gz" \
      "https://api.github.com/repos/derailed/k9s/releases/latest" \
      "k9s"
  lazygit: |
    LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep -Po '"tag_name": "v\K[^"]*')
    curl -Lo lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"
    tar xf lazygit.tar.gz lazygit
    sudo install lazygit /usr/local/bin
  minikube: |
    curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    sudo install ./minikube-linux-amd64 /usr/local/bin/minikube && rm ./minikube-linux-amd64
  ngrok: |
    curl https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip ngrok.zip
    unzip ngrok.zip
    mv ngrok/ngrok ~/bin/
  nightly: |
    APP_DIR=~/.local/share/applications/
    NIGHTLY_CFG=~/.config/nightly/nightly.desktop
    desktop-file-validate $NIGHTLY_CFG
    desktop-file-install --dir=$APP_DIR $NIGHTLY_CFG
  nordvpn: |
    # ref: https://nordvpn.com/download/linux/
    URL=https://repo.nordvpn.com/deb/nordvpn/debian/pool/main/nordvpn-release_1.0.0_all.deb
    DEB=$(basename $URL)
    wget -q $URL
    sudo apt install ./$DEB && rm ./$DEB
  obsidian: |
    LATEST="https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest"
    URL=$(curl -sL "$LATEST" | jq -r ".assets[] | select(.name | test(\"AppImage\")) | .browser_download_url" | grep -v arm64)
    NAME=$(basename $URL)
    wget -q $URL
    chmod +x ./$NAME && mv ./$NAME ~/bin/obsidian
  papertrail: |
    sudo gem install papertrail
  pulse-sms: |
    LATEST=https://api.github.com/repos/maplemedia/pulse-sms-desktop/releases/latest
    URL=$(curl -sL $LATEST | jq -r '.assets[] | select(.name | contains("deb")) | .browser_download_url')
    DEB=$(basename $URL)
    wget -q $URL
    sudo apt install ./$DEB && rm ./$DEB
  riot: |
    sudo apt install -y lsb-release wget apt-transport-https
    sudo wget -qO /usr/share/keyrings/riot-im-archive-keyring.gpg https://packages.riot.im/debian/riot-im-archive-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/riot-im-archive-keyring.gpg] https://packages.riot.im/debian/ $(lsb_release -cs) main" |
      sudo tee /etc/apt/sources.list.d/riot-im.list
    sudo apt update
    sudo apt install riot-web
  rust: |
    curl https://sh.rustup.rs -sSf | sh
  rtx: |
    curl https://rtx.pub/rtx-latest-linux-x64 > ~/bin/rtx
    chmod +x ~/bin/rtx
  spotify: |
    # 1. Add the Spotify repository signing keys to be able to verify downloaded packages
    sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 931FF8E79F0876134EDDBDCCA87FF9DF48BF1C90
    # 2. Add the Spotify repository
    echo deb http://repository.spotify.com stable non-free | sudo tee /etc/apt/sources.list.d/spotify.list
    # 3. Update list of available packages
    sudo apt-get update
    # 4. Install Spotify
    sudo apt-get install spotify-client
  spotify-src: |
    # Spotify's postinst script has a bug: find_sources() only scans *.list files
    # (via /etc/apt/sources.list.d/*.list glob) and never checks *.sources (DEB822
    # format). So when spotify.sources exists but spotify.list does not, every upgrade
    # sees no Spotify source configured and re-creates spotify.list from scratch -
    # producing duplicate-source warnings on every apt update. The escape hatch is
    # documented in the postinst itself: if the file exists (even empty), the
    # "[ ! -e $DEFAULT_SOURCE ]" check fails and the re-write is skipped. Keeping an
    # empty spotify.list here prevents the postinst from stomping it on each upgrade.
    sudo truncate -s0 /etc/apt/sources.list.d/spotify.list
  steam: |
    URL=http://media.steampowered.com/client/installer/steam.deb
    DEB=$(basename $URL)
    wget -q $URL
    sudo apt install ./$DEB && rm ./$DEB
  syncthing: |
    sudo mkdir -p /etc/apt/keyrings
    sudo curl -L -o /etc/apt/keyrings/syncthing-archive-keyring.gpg https://syncthing.net/release-key.gpg
    echo "deb [signed-by=/etc/apt/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable" | sudo tee /etc/apt/sources.list.d/syncthing.list
    sudo apt-get update
    sudo apt-get install -y syncthing
    systemctl --user enable syncthing.service
    systemctl --user start syncthing.service
  vim+git: |
    sudo apt-get install -y vim git
    sudo update-alternatives --set editor /usr/bin/vim.basic
  virtualbox: |
    wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo apt-key add -
    wget -q https://www.virtualbox.org/download/oracle_vbox.asc -O- | sudo apt-key add -
    sudo apt-get update
    sudo apt-get install virtualbox-6.0
  vscode: |
    sudo apt update
    sudo apt install -y software-properties-common apt-transport-https wget
    wget -q https://packages.microsoft.com/keys/microsoft.asc -O- | sudo apt-key add -
    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/repos/vscode stable main"
    sudo apt update
    sudo apt install code
