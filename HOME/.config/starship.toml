format = """$hostname${custom.path}${custom.wtmatch}${custom.wtdiff}${custom.branch}$all$character"""

[username]
disabled = true

[hostname]
# ssh_only stays true (default): nothing locally, "🌐 host" over SSH. Drop the "in".
format = "[$ssh_symbol$hostname]($style) "

# Builtin directory is replaced by custom.path, which renders the full ~-path with
# the org/repo slug highlighted in-line. Worktree leaf and subpath show dim.
[directory]
disabled = true

# Builtin branch is replaced by custom.branch, which suppresses itself in the
# ≡ case (worktree dir slug already equals the branch).
[git_branch]
disabled = true

[gcloud]
disabled = true

# --- full path, with the org/repo slug highlighted ---
# Renders the whole ~-path on one line. The org/repo slug (the two components that
# name the repo — `tatari-tv/marquee`, or `tatari-tv/klod` for a bare-container
# worktree) is bold mauve; the prefix, worktree leaf, and subpath are dim grey.
# Non-repo dirs render the whole path dim. Inline ANSI is safe — starship wraps it
# in the shell's non-printing markers.
[custom.path]
description = "full ~-path with the org/repo slug highlighted"
shell = ["bash", "--noprofile", "--norc"]
when = "true"
command = '''
root=$(git rev-parse --show-toplevel 2>/dev/null)
common=$(git rev-parse --git-common-dir 2>/dev/null)
P=$(pwd)
DIM=$(printf '\033[38;2;127;132;156m')
HI=$(printf '\033[1;38;2;203;166;247m')
RST=$(printf '\033[0m')
tilde() { case "$1" in "$HOME") printf '~' ;; "$HOME"/*) printf '~/%s' "${1#"$HOME"/}" ;; *) printf '%s' "$1" ;; esac; }
if [ -n "$root" ] && [ "$(basename "$common")" = ".bare" ]; then
    case "$common" in /*) c=$common ;; *) c=$P/$common ;; esac
    A=$(cd "$(dirname "$c")" && pwd)
elif [ -n "$root" ]; then
    A=$root
else
    A=""
fi
if [ -n "$A" ]; then
    pre=$(tilde "$(dirname "$(dirname "$A")")")
    slug="$(basename "$(dirname "$A")")/$(basename "$A")"
    post=${P#"$A"}
    printf '%s' "${DIM}${pre}/${RST}${HI}${slug}${RST}${DIM}${post}${RST}"
else
    printf '%s' "${DIM}$(tilde "$P")${RST}"
fi
'''
format = "$output "

# --- clone bare-container worktree markers + conditional branch ---
# ≡ (green) = worktree dir slug matches the real branch (branch hidden, path leaf
# already shows it); ≈ (amber) = diverged (branch shown). All gate on
# `--git-common-dir` ending in `.bare`, so flat checkouts never trigger the markers.
[custom.wtmatch]
description = "≡ when the worktree dir slug matches the branch"
shell = ["bash", "--noprofile", "--norc"]
when = '''
c=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
[ "$(basename "$c")" = ".bare" ] || exit 1
[ "$(basename "$(git rev-parse --show-toplevel 2>/dev/null)")" = "$(git rev-parse --abbrev-ref HEAD 2>/dev/null)" ]
'''
command = "printf '≡'"
style = "fg:#a6e3a1"
format = "[$output]($style) "

[custom.wtdiff]
description = "≈ when the worktree dir slug diverges from the branch"
shell = ["bash", "--noprofile", "--norc"]
when = '''
c=$(git rev-parse --git-common-dir 2>/dev/null) || exit 1
[ "$(basename "$c")" = ".bare" ] || exit 1
[ "$(basename "$(git rev-parse --show-toplevel 2>/dev/null)")" != "$(git rev-parse --abbrev-ref HEAD 2>/dev/null)" ]
'''
command = "printf '≈'"
style = "fg:#f9e2af"
format = "[$output]($style) "

[custom.branch]
description = "branch name, except in the ≡ case where the path leaf already is it"
shell = ["bash", "--noprofile", "--norc"]
when = '''
git rev-parse --is-inside-work-tree >/dev/null 2>&1 || exit 1
c=$(git rev-parse --git-common-dir 2>/dev/null)
if [ "$(basename "$c")" = ".bare" ]; then
    [ "$(basename "$(git rev-parse --show-toplevel 2>/dev/null)")" != "$(git rev-parse --abbrev-ref HEAD 2>/dev/null)" ]
else
    true
fi
'''
command = "git rev-parse --abbrev-ref HEAD 2>/dev/null"
style = "bold purple"
format = "[$output]($style) "
