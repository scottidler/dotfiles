server:
  host: "0.0.0.0"
  port: 8181

vault:
  root-path: ~/repos/scottidler/obsidian/
  inbox-path: ~/repos/scottidler/obsidian/inbox
  vault-name: obsidian

transcriber:
  url: http://localhost:8090
  timeout-secs: 120

groq:
  api-key: GROQ_API_KEY
  model: whisper-large-v3

llm:
  provider: claude
  model: claude-sonnet-4-6
  api-key: ANTHROPIC_API_KEY

telegram:
  bot-token: TELEGRAM_BOT_TOKEN
  allowed-chat-ids: [8474692082]
  host: desk

# discord:
#   bot-token: DISCORD_BOT_TOKEN
#   channel-id: 0

# Signal transport - peer to Telegram with end-to-end-encrypted envelope
# routing. Bootstrap is out-of-band: stop borg, run
#   signal-rs link --name borg --state-dir ~/.local/share/sb/borg/signal-state/
# once on the host that should run Signal ingest, scan the QR with the
# primary phone (Settings -> Linked Devices), then uncomment the block below
# and restart borg. `host` is MANDATORY (hostname of the machine that runs
# ingest); Signal-Server fans Note-to-Self envelopes to every linked device,
# so leaving `host` unset on a multi-machine install would silently double-
# ingest. See docs/design/2026-05-24-signal-as-borg-transport.md.
signal:
  allowed-senders: []         # peer ACI UUIDs allowed to send borg material
  # notification-recipient defaults to Note-to-Self (your own account)
  host: desk
  # notetoself-rate-threshold-per-hour: 100  # default; raise only after a documented baseline reason

# Desktop notifications - peer to the Telegram notifier.
# Same Processing... -> Saved/Duplicate/Failed messages via libnotify
# (user session D-Bus). Host-gated so headless borg hosts stay silent.
desktop:
  enabled: true
  host: desk
  timeout-ms: 5000
  appname: borg

fabric:
  binary: /home/saidler/go/bin/fabric
  model: ""
  summarize-pattern-youtube: obsidian-note.md
  summarize-pattern-article: obsidian-note.md
  tag-pattern: create_tags
  classify-pattern: obsidian-classify.md
  condense-pattern: condense.md
  max-content-chars: 100000

routing:
  confidence-threshold: 0.6
  fallback-domain: inbox

hotkey:
  host: desk.lan
  port: 8181
  key: "<Ctrl><Shift>b"

log-level: debug

# ---------------------------------------------------------------------------
# Staged ingestion pipeline
# ---------------------------------------------------------------------------
# See docs/design/2026-04-19-staged-ingestion-pipeline.md in the repo.
# enabled=true activates Gate-0 (blocklist), Gate-1 (raw block-page detection)
# and Gate-2 (paraphrase-of-block-page detection) plus stage-0 artifact
# writes under `root`. double-write=true keeps the legacy publish path live
# while the staged pipeline records bytes as a side-effect of every fetch.
staging:
  enabled: true
  double-write: true
  root: ~/.local/share/sb/borg/stages
  retention-days: 60
  rejected-retention-days: 90
  layout: per-trace
  max-size-gb: 20
  size-alert-threshold-pct: 80

# ---------------------------------------------------------------------------
# URL Canonicalization
# ---------------------------------------------------------------------------
# Extends built-in defaults. Add custom rules here for sites you frequently
# share from. Rules with the same `name` as a built-in replace it.
canonicalization:
  rules:
    # Reddit - old.reddit.com -> www.reddit.com
    - name: old-reddit
      match: 'https?://old\.reddit\.com/(?P<path>.*)'
      canonical: https://www.reddit.com/{path}

# ---------------------------------------------------------------------------
# Migration
# ---------------------------------------------------------------------------
# Spec for `borg migrate`. SINGLE SOURCE OF TRUTH for schema evolution.
#
# To evolve the schema in the future:
#   1. Update field-renames below (add old_name: new_name mappings)
#   2. Run:  borg migrate --dry-run
#   3. Run:  borg migrate --apply
#   4. Review: cd ~/repos/scottidler/obsidian && git diff
#   5. Commit vault changes
#   6. Update render_note() in markdown.rs for new notes
#
migration:
  field-renames:
    url: source

  value-renames:
    origin:
      human: authored

  field-transforms:
    source: canonicalize
    type: reclassify
    tags: normalize

  title-fallback: true
  seed-borg-log: true

  skip-folders:
    - system
    - journal
    - templates
