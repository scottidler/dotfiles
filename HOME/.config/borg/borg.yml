server:
  host: "0.0.0.0"
  port: 8181

vault:
  root-path: ~/repos/scottidler/obsidian/
  inbox-path: ~/repos/scottidler/obsidian/inbox
  vault-name: obsidian

transcriber:
  url: http://localhost:8090
  timeout-secs: 120

groq:
  api-key: GROQ_API_KEY
  model: whisper-large-v3

llm:
  provider: claude
  model: claude-sonnet-4-6
  api-key: ANTHROPIC_API_KEY

telegram:
  bot-token: TELEGRAM_BOT_TOKEN
  allowed-chat-ids: [8474692082]
  host: desk

# discord:
#   bot-token: DISCORD_BOT_TOKEN
#   channel-id: 0

fabric:
  binary: /home/saidler/go/bin/fabric
  model: ""
  summarize-pattern-youtube: obsidian_note
  summarize-pattern-article: obsidian_note
  tag-pattern: create_tags
  classify-pattern: obsidian_classify
  max-content-chars: 30000

routing:
  confidence-threshold: 0.6
  fallback-domain: inbox

hotkey:
  host: desk.lan
  port: 8181
  key: "<Ctrl><Shift>b"

log-level: debug

# ---------------------------------------------------------------------------
# URL Canonicalization
# ---------------------------------------------------------------------------
# Extends built-in defaults. Add custom rules here for sites you frequently
# share from. Rules with the same `name` as a built-in replace it.
canonicalization:
  rules:
    # Reddit - old.reddit.com -> www.reddit.com
    - name: old-reddit
      match: 'https?://old\.reddit\.com/(?P<path>.*)'
      canonical: https://www.reddit.com/{path}

# ---------------------------------------------------------------------------
# Migration
# ---------------------------------------------------------------------------
# Spec for `borg migrate`. SINGLE SOURCE OF TRUTH for schema evolution.
#
# To evolve the schema in the future:
#   1. Update field-renames below (add old_name: new_name mappings)
#   2. Run:  borg migrate --dry-run
#   3. Run:  borg migrate --apply
#   4. Review: cd ~/repos/scottidler/obsidian && git diff
#   5. Commit vault changes
#   6. Update render_note() in markdown.rs for new notes
#
migration:
  field-renames:
    url: source

  value-renames:
    origin:
      human: authored

  field-transforms:
    source: canonicalize
    type: reclassify
    tags: normalize

  title-fallback: true
  seed-borg-log: true

  skip-folders:
    - system
    - journal
    - templates
