log-level: debug

auth:
  creds-path: tatari

slack:
  token-env: SLACK_XOXP_TOKEN
  channel: D01G4Q7AWLV
  browser-index: 0
  schedule: Mon,Thu 07:00:00

message-filters:
  # Bots: GitHub/CI notifications via the sre@ group (backstage-tatari[bot])
  # -> move straight out of the inbox into Bots. Listed first so it wins over
  # the *@tatari.tv rule below (first match wins). Sweeps the backlog too.
  - bots:
      from: 'machine@tatari.tv'
      label: INBOX
      action: Bots

  # Leadership: anything from the CEO / SVP Eng -> Star, so it is protected from
  # culling even when CC'd or sent via a list (the only-me-vip rule misses those).
  - leadership:
      from:
        - 'philip@tatari.tv'
        - 'mark.weiler@tatari.tv'
      label: INBOX
      action: Star

  # VIP: direct to me, no CC, from leadership/peers -> Star
  - only-me-vip:
      to: ['scott.idler@tatari.tv']
      cc: []
      from:
        - 'philip@tatari.tv'
        - 'mark.weiler@tatari.tv'
        - 'amit@tatari.tv'
        - 'andy@tatari.tv'
        - 'benjamin.heaton@tatari.tv'
        - 'brad@tatari.tv'
        - 'bryce.york@tatari.tv'
        - 'jazz@tatari.tv'
        - 'mike@tatari.tv'
        - 'muller@tatari.tv'
        - 'raissa.nebie@tatari.tv'
        - 'bruce@tatari.tv'
        - 'kwun.choy@tatari.tv'
        - 'mike.sisario@tatari.tv'
        - 'reno@tatari.tv'
        - 'toussaint.minett@tatari.tv'
      headers:
        List-Id: []
      label: INBOX
      action: Star

  # Company: direct to me, no CC, from anyone @tatari.tv -> Important
  - only-me-ttv:
      to: ['scott.idler@tatari.tv']
      cc: []
      from: '*@tatari.tv'
      headers:
        List-Id: []
      label: INBOX
      action: Flag

state-filters:
  # Starred threads are fully protected
  - Starred:
      labels: [Starred]
      ttl: Keep

  # Important (but not starred) threads are protected
  - Important:
      labels: [Important]
      ttl: Keep

  # Read inbox messages age off after 7d, unread after 21d
  - Cull:
      label: INBOX
      ttl:
        read: 3d
        unread: 21d
      action: Purgatory

  # Purgatory ages off to Oblivion after 3d
  - Purge:
      label: Purgatory
      ttl: 3d
      action: Oblivion
