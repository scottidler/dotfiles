log-level: debug

auth:
  creds-path: tatari

slack:
  token-env: SLACK_XOXP_TOKEN
  channel: D01G4Q7AWLV
  browser-index: 0
  schedule: Mon,Thu 07:00:00

message-filters:
  # VIP: direct to me, no CC, from leadership/peers -> Star
  - only-me-vip:
      to: ['scott.idler@tatari.tv']
      cc: []
      from:
        - 'philip@tatari.tv'
        - 'mark.weiler@tatari.tv'
        - 'amit@tatari.tv'
        - 'andy@tatari.tv'
        - 'benjamin.heaton@tatari.tv'
        - 'brad@tatari.tv'
        - 'bryce.york@tatari.tv'
        - 'jazz@tatari.tv'
        - 'mike@tatari.tv'
        - 'muller@tatari.tv'
        - 'raissa.nebie@tatari.tv'
        - 'bruce@tatari.tv'
        - 'dan.stynchula@tatari.tv'
        - 'mike.sisario@tatari.tv'
        - 'reno@tatari.tv'
        - 'toussaint.minett@tatari.tv'
      headers:
        List-Id: []
      label: INBOX
      action: Star

  # Company: direct to me, no CC, from anyone @tatari.tv -> Important
  - only-me-ttv:
      to: ['scott.idler@tatari.tv']
      cc: []
      from: '*@tatari.tv'
      headers:
        List-Id: []
      label: INBOX
      action: Flag

state-filters:
  # Starred threads are fully protected
  - Starred:
      labels: [Starred]
      ttl: Keep

  # Important (but not starred) threads are protected
  - Important:
      labels: [Important]
      ttl: Keep

  # Read inbox messages age off after 7d, unread after 21d
  - Cull:
      label: INBOX
      ttl:
        read: 3d
        unread: 21d
      action: Purgatory

  # Purgatory ages off to Oblivion after 3d
  - Purge:
      label: Purgatory
      ttl: 3d
      action: Oblivion
