[clone]

default = main

remotes =
    ssh://git@github.com
    https://github.com

# clone only consumes `sshkey` (the transport key for the initial clone).
# Commit identity + signing key are NOT set per-repo: they resolve from
# ~/.gitconfig (default = home/scottidler) and the includeIf gitdir override
# in ~/.gitconfig-work (work/escote-tatari for ~/repos/tatari-tv/). Do NOT
# re-add name/email/signingkey here — that reintroduces frozen per-repo copies.
[org.default]
sshkey = ~/.ssh/identities/home/id_ed25519

[org.tatari-tv]
sshkey = ~/.ssh/identities/work/id_ed25519
