# remap C-b -> C-q
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# easy config reloads
bind r source-file ~/.tmux.conf

# sane split commands
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# 65/35 vertical split (matches Tactile Q/A row weights 35:19)
bind T split-window -v -p 35

# 4x3 grid layout (4 columns, 3 rows = 12 panes) for 4K display
bind G run-shell '~/.tmux/layouts/grid-4x3.sh'

# fast pane-switching
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse support
set -g mouse on

# Vi-style copy mode with large scrollback
# Usage:
#   1. C-q [          enter copy mode
#   2. scroll up      mouse wheel, PgUp, or k
#   3. Space          start selection
#   4. scroll down    PgDn, j, or mouse wheel
#   5. y              copy to system clipboard (Enter for tmux buffer only)
#   6. Ctrl+Shift+V   paste anywhere (C-q ] for tmux buffer)
setw -g mode-keys vi
set -g history-limit 100000

# Copy to system clipboard with 'y' in copy mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# stop renaming windows automatically
set-option -g allow-rename off

# prevent tmux from messing with my escape key
set -s escape-time 0

# Terminal settings (tmux-256color has better feature support than screen-256color)
set -g default-terminal "tmux-256color"
set-option -g focus-events on
set-option -sa terminal-features ',xterm-256color:RGB'

##### Keep X clipboard env fresh inside tmux #####
# Inherit and refresh the current DISPLAY/XAUTHORITY so tools like xclip work.
set -g update-environment "DISPLAY XAUTHORITY"

# Whenever a client attaches, push the live vars into the tmux server.
set-hook -g client-attached 'run-shell "tmux setenv -g DISPLAY $DISPLAY; tmux setenv -g XAUTHORITY $XAUTHORITY"'
